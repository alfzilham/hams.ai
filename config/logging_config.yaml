# ============================================================
# Logging Configuration
# Uses loguru for application logs + OpenTelemetry for traces.
# ============================================================

logging:
  # Global log level: DEBUG | INFO | WARNING | ERROR | CRITICAL
  level: INFO

  # Console output
  console:
    enabled: true
    format: "<green>{time:HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan> - {message}"
    colorize: true
    level: INFO

  # File output (rotated daily, kept 7 days)
  file:
    enabled: true
    path: ./logs/agent_{time:YYYY-MM-DD}.log
    rotation: "00:00"       # rotate at midnight
    retention: "7 days"
    compression: zip
    level: DEBUG
    format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {name}:{function}:{line} | {message}"

  # Structured JSON log (for log aggregation services)
  json:
    enabled: false
    path: ./logs/agent_structured.jsonl
    level: INFO

observability:
  # OpenTelemetry tracing
  tracing:
    enabled: false
    exporter: otlp          # otlp | jaeger | zipkin | console
    endpoint: http://localhost:4317
    service_name: hams-ai
    service_version: "0.1.0"

    # Span attributes added to every trace
    resource_attributes:
      deployment.environment: development

  # Cost tracking
  cost_tracking:
    enabled: true
    output_path: ./logs/cost_report.jsonl

    # Pricing per 1M tokens (USD) — update when provider prices change
    pricing:
      # Ollama (local — no cost)
      deepseek-coder:
        input: 0.00
        output: 0.00
      llama3:
        input: 0.00
        output: 0.00
      mistral:
        input: 0.00
        output: 0.00
      codellama:
        input: 0.00
        output: 0.00
      # Groq (per 1M tokens)
      llama3-70b-8192:
        input: 0.59
        output: 0.79
      mixtral-8x7b-32768:
        input: 0.24
        output: 0.24
      # Google Gemini (per 1M tokens)
      gemini-1.5-flash:
        input: 0.075
        output: 0.30
      gemini-1.5-pro:
        input: 3.50
        output: 10.50
