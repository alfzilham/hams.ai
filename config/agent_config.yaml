# ============================================================
# Agent Configuration
# Override any value with an environment variable:
#   AGENT_MAX_STEPS=20 python -m agent.main "task"
# ============================================================

agent:
  # LLM provider: anthropic | openai | ollama
  llm_provider: anthropic

  # Model name (uses provider default if empty)
  model: claude-sonnet-4-5

  # Hard cap on reasoning loop iterations
  max_steps: 30

  # Seconds before a single tool call is killed
  tool_timeout: 30

  # Whether to run task decomposition before the loop
  use_planner: true

  # Stream step-by-step logs to stdout
  verbose: true

  # Temperature for LLM calls (0.0 = deterministic)
  temperature: 0.0

  # Max tokens per LLM response
  max_tokens: 4096

  # Tools enabled for this agent instance
  enabled_tools:
    - read_file
    - write_file
    - list_dir
    - search_files
    - delete_file
    - run_command
    - run_code
    - web_search

llm:
  # Anthropic-specific
  anthropic:
    default_model: claude-sonnet-4-5
    max_tokens: 4096
    temperature: 0.0

  # OpenAI-specific
  openai:
    default_model: gpt-4o
    max_tokens: 4096
    temperature: 0.0

  # Ollama-specific (local)
  ollama:
    default_model: llama3
    base_url: http://localhost:11434
    max_tokens: 4096
    temperature: 0.0

  # Router fallback order (if primary fails)
  fallback_order:
    - anthropic
    - openai
    - ollama

  # Max retries per provider before trying the next
  max_retries: 3

memory:
  # Max entries in short-term ring buffer
  short_term_max: 50

  # Enable ChromaDB long-term memory
  enable_long_term: true

  # Path for ChromaDB persistence
  persist_dir: ./chroma_db

  # Number of long-term results to retrieve per query
  recall_top_k: 3
