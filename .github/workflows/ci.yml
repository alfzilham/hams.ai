# ============================================================
# Hams AI — CI Pipeline
# Runs on every push and pull request to main/develop.
#
# Jobs:
#   lint     — ruff + mypy
#   test     — pytest unit tests with coverage
#   docker   — build Docker image (no push on PR)
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.14"
  IMAGE_NAME: hams-ai-app

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (linter)
        run: ruff check agent/ tests/

      - name: Run ruff (formatter check)
        run: ruff format --check agent/ tests/

      - name: Run mypy (type check)
        run: mypy agent/
        continue-on-error: true   # type errors are warnings for now


  # ── Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        env:
          # Dummy keys so settings don't fail validation
          GROQ_API_KEY: dummy
          GOOGLE_API_KEY: dummy
          TAVILY_API_KEY: dummy
          AGENT_LLM_PROVIDER: ollama
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          pytest tests/unit/ \
            --cov=agent \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false


  # ── Docker Build ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build sandbox image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: hams-ai-sandbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
