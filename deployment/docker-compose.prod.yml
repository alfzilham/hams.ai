# ============================================================
# AI Coding Agent — Production Docker Compose
#
# Usage:
#   docker-compose -f deployment/docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Build the image:  docker build -f docker/Dockerfile -t ai-coding-agent:latest .
#   2. Create .env with API keys (see .env.example)
# ============================================================

version: "3.9"

services:

  # ── Agent API (production) ──────────────────────────────────────────────
  agent:
    image: ai-coding-agent:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - agent_workspace:/workspace
      - agent_logs:/app/logs
    env_file:
      - ../.env
    environment:
      - AGENT_ENV=production
      - LOG_LEVEL=INFO
      - AGENT_LLM_PROVIDER=${AGENT_LLM_PROVIDER:-anthropic}
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - agent-prod
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=128m

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - agent-prod
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Named volumes ────────────────────────────────────────────────────────
volumes:
  agent_workspace:
    driver: local
  agent_logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────
networks:
  agent-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
