<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Feedback</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link rel="stylesheet" href="/static/chat.css"/>
<style>
  body {
    margin: 0;
    font-family: 'Sora', sans-serif;
    color: var(--text-1);
    background: var(--bg-1);
    overflow: hidden;
  }
  #auroraBg {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: -1; pointer-events: none;
  }
  /* Scrollbar styling matching chat-ui */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
</style>
</head>
<body>
<canvas id="auroraBg"></canvas>

<div id="main" style="display:flex;height:100vh;position:relative;z-index:10;">
  <!-- Sidebar -->
  <div id="fbSidebar" style="width:300px; border-right:1px solid var(--glass-border); padding:20px 16px; overflow:auto; background:var(--glass-bg); backdrop-filter:blur(10px); display:flex; flex-direction:column; gap:16px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/chat-ui" class="ext-pill" style="text-decoration:none;"><i class="bi bi-arrow-left"></i><span>Chat</span></a>
      <input id="fbSearch" class="ext-pill" placeholder="Cari thread..." style="flex:1;padding:8px 12px;border:1px solid var(--glass-border);background:var(--bg-2);color:var(--text-1);font-family:'Sora', sans-serif;outline:none;"/>
    </div>
    <div id="fbThreadList" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>

  <!-- Main Chat Area -->
  <div style="flex:1;display:flex;flex-direction:column; background:var(--bg-1);">
    <!-- Header -->
    <div style="display:flex;gap:12px;padding:16px 24px;border-bottom:1px solid var(--glass-border);align-items:center;background:var(--glass-bg);">
      <div id="fbHeader" style="flex:1;font-weight:600;font-size:1.1rem;color:var(--text-1);">Pilih thread</div>
      <button id="fbResolve" class="input-action-btn" style="background:var(--bg-2);border:1px solid var(--glass-border);color:var(--text-1);border-radius:20px;padding:6px 16px;"><i class="bi bi-check2-circle" style="color:var(--green)"></i><span>Resolved</span></button>
      <button id="fbExport" class="input-action-btn" style="background:var(--bg-2);border:1px solid var(--glass-border);color:var(--text-1);border-radius:20px;padding:6px 16px;"><i class="bi bi-download"></i><span>CSV</span></button>
    </div>

    <!-- Chat Messages -->
    <div id="fbAdminChat" style="flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;">
      <div class="md-body" id="fbAdminMessages" style="white-space:pre-wrap;color:var(--text-1);font-family:'Sora', sans-serif;line-height:1.6;width:100%;max-width:800px;margin:0 auto;"></div>
    </div>

    <!-- Input Box -->
    <div style="padding:20px;max-width:900px;margin:0 auto;width:100%;box-sizing:border-box;">
      <div class="input-card" style="border-radius:20px;padding:8px;background:var(--glass-bg);border:1px solid var(--glass-border);">
        <textarea id="fbAdminText" rows="2" placeholder="Balas feedback..." style="width:100%;resize:none;padding:12px 16px;background:transparent;border:none;color:var(--text-1);font-family:'Sora', sans-serif;outline:none;font-size:1rem;box-sizing:border-box;"></textarea>
        <div class="input-actions" style="padding:8px 16px;">
          <div class="input-actions-spacer"></div>
          <button id="fbAdminSend" class="input-action-btn" style="background:var(--accent);color:#000;font-weight:600;padding:8px 24px;border-radius:20px;"><i class="bi bi-send"></i><span>Kirim</span></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
    // Theme initialization
    const theme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);

    (function () {
        const canvas = document.getElementById('auroraBg');
        const gl = canvas.getContext('webgl2');
        if (!gl) return;
        const VERT = `#version 300 es\nin vec2 position;\nvoid main(){gl_Position=vec4(position,0.0,1.0);}`;
        const FRAG = `#version 300 es\nprecision highp float;\nuniform float uTime;uniform float uAmplitude;uniform vec3 uColorStops[3];uniform vec2 uResolution;uniform float uBlend;\nout vec4 fragColor;\nvec3 permute(vec3 x){return mod(((x*34.0)+1.0)*x,289.0);}\nfloat snoise(vec2 v){const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod(i,289.0);vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);m=m*m;m=m*m;vec3 x=2.0*fract(p*C.www)-1.0;vec3 h=abs(x)-0.5;vec3 ox=floor(x+0.5);vec3 a0=x-ox;m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.0*dot(m,g);}\nvoid main(){vec2 uv=gl_FragCoord.xy/uResolution;vec3 c0=uColorStops[0];vec3 c1=uColorStops[1];vec3 c2=uColorStops[2];vec3 ramp=uv.x<0.5?mix(c0,c1,uv.x*2.0):mix(c1,c2,(uv.x-0.5)*2.0);float h=snoise(vec2(uv.x*2.0+uTime*0.1,uTime*0.25))*0.5*uAmplitude;h=exp(h);h=(uv.y*2.0-h+0.2);float intensity=0.6*h;float auroraAlpha=smoothstep(0.20-uBlend*0.5,0.20+uBlend*0.5,intensity);fragColor=vec4(intensity*ramp*auroraAlpha,auroraAlpha);}`;
        function makeShader(type, src) { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
        const prog = gl.createProgram();
        gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, VERT));
        gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, FRAG));
        gl.linkProgram(prog); gl.useProgram(prog);
        const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
        const loc = gl.getAttribLocation(prog, 'position');
        gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
        gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
        const uTime = gl.getUniformLocation(prog, 'uTime');
        const uAmp = gl.getUniformLocation(prog, 'uAmplitude');
        const uCS = gl.getUniformLocation(prog, 'uColorStops');
        const uRes = gl.getUniformLocation(prog, 'uResolution');
        const uBlend = gl.getUniformLocation(prog, 'uBlend');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0, 0, canvas.width, canvas.height); }
        window.addEventListener('resize', resize); resize();
        const t0 = performance.now();
        (function render() {
            requestAnimationFrame(render);
            const t = (performance.now() - t0) * 0.001 * 0.4;
            gl.clearColor(0, 0, 0, 0); gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniform1f(uTime, t); gl.uniform1f(uAmp, 0.8);
            gl.uniform3fv(uCS, [0.0, 0.95, 1.0, 0.0, 0.5, 0.55, 1.0, 1.0, 1.0]);
            gl.uniform2f(uRes, canvas.width, canvas.height); gl.uniform1f(uBlend, 0.6);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
        })();
    })();
</script>
<script src="/static/feedback.js"></script>
</body>
</html>
