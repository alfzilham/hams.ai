<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAMS.AI — Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        :root[data-theme="dark"] {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #22222f;
            --border: #2e2e40;
            --text: #e8e8f0;
            --text-muted: #7a7a9a;
            --accent: #7c6ff7;
            --accent-hover: #6a5ee0;
            --user-bubble: #2a2a6e;
            --ai-bubble: #1e1e2e;
            --danger: #e05c5c;
        }

        :root[data-theme="light"] {
            --bg: #f4f4f8;
            --surface: #ffffff;
            --surface2: #ebebf5;
            --border: #d8d8e8;
            --text: #1a1a2e;
            --text-muted: #888899;
            --accent: #7c6ff7;
            --accent-hover: #6a5ee0;
            --user-bubble: #dcdaf8;
            --ai-bubble: #ffffff;
            --danger: #e05c5c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-icon:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        /* ── Chat Area ── */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .msg-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            max-width: 820px;
            width: 100%;
        }

        .msg-row.user {
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .avatar.ai {
            background: var(--accent);
            color: #fff;
        }

        .avatar.user {
            background: var(--surface2);
            color: var(--text-muted);
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.92rem;
            line-height: 1.65;
            max-width: calc(100% - 50px);
            word-break: break-word;
        }

        .bubble.ai {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .bubble.user {
            background: var(--user-bubble);
            border-top-right-radius: 4px;
        }

        .bubble pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 0.82rem;
        }

        .bubble code {
            font-family: 'Fira Code', monospace;
        }

        .typing-indicator span {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-6px);
            }
        }

        /* ── Input Area ── */
        #inputArea {
            padding: 16px 24px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 14px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: 0.92rem;
            resize: none;
            max-height: 160px;
            line-height: 1.5;
        }

        #userInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            background: var(--accent);
            border: none;
            color: #fff;
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            font-size: 0.95rem;
        }

        #sendBtn:hover {
            background: var(--accent-hover);
        }

        #sendBtn:disabled {
            background: var(--surface2);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .input-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: center;
        }

        /* ── Welcome Screen ── */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            color: var(--text-muted);
            padding: 40px;
        }

        #welcome i {
            font-size: 3rem;
            color: var(--accent);
        }

        #welcome h2 {
            color: var(--text);
            font-size: 1.4rem;
        }

        #welcome p {
            font-size: 0.9rem;
            text-align: center;
            max-width: 400px;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }

        .chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 7px 14px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
            z-index: 999;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <i class="bi bi-stars" style="color:var(--accent)"></i>
            HAMS<span>.AI</span> Chat
        </div>
        <div class="header-right">
            <button class="btn-icon" onclick="clearChat()" title="Hapus percakapan">
                <i class="bi bi-trash3"></i>
            </button>
            <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="Ganti tema">
                <i class="bi bi-sun"></i>
            </button>
        </div>
    </header>

    <!-- Welcome screen -->
    <div id="welcome">
        <i class="bi bi-stars"></i>
        <h2>Halo! Saya Hams.AI 👋</h2>
        <p>Asisten AI pribadi Alfiz Ilham. Tanya apa saja tentang portofolio, layanan, atau topik umum!</p>
        <div class="suggestion-chips">
            <div class="chip" onclick="sendSuggestion('Apa saja layanan yang tersedia?')">💼 Layanan tersedia</div>
            <div class="chip" onclick="sendSuggestion('Ceritakan tentang Alfiz Ilham')">👤 Tentang Alfiz</div>
            <div class="chip" onclick="sendSuggestion('Bagaimana cara menghubungi Alfiz?')">📞 Kontak</div>
            <div class="chip" onclick="sendSuggestion('Apa saja proyek yang pernah dibuat?')">🚀 Proyek unggulan</div>
        </div>
    </div>

    <!-- Chat messages -->
    <div id="chatBox" style="display:none;"></div>

    <!-- Input -->
    <div id="inputArea">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="Ketik pesan..." onkeydown="handleKey(event)"
                oninput="autoResize(this)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
        <div class="input-hint">Enter untuk kirim &middot; Shift+Enter untuk baris baru</div>
    </div>

    <div id="toast"></div>

    <script>
        // ── State ──
        let history = [];      // [{role, content}, ...]
        let isLoading = false;
        let sessionId = null;

        // ── Theme ──
        const saved = localStorage.getItem("hams_theme") || "dark";
        setTheme(saved);

        function setTheme(t) {
            document.documentElement.setAttribute("data-theme", t);
            localStorage.setItem("hams_theme", t);
            document.getElementById("themeBtn").innerHTML =
                t === "dark" ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
        }
        function toggleTheme() {
            const curr = document.documentElement.getAttribute("data-theme");
            setTheme(curr === "dark" ? "light" : "dark");
        }

        // ── Textarea auto-resize ──
        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = Math.min(el.scrollHeight, 160) + "px";
        }
        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        // ── Render helpers ──
        function formatContent(text) {
            return text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`\n]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function appendMessage(role, content) {
            const chatBox = document.getElementById("chatBox");
            const row = document.createElement("div");
            row.className = `msg-row ${role}`;

            const avatar = document.createElement("div");
            avatar.className = `avatar ${role}`;
            avatar.innerHTML = role === "ai"
                ? '<i class="bi bi-stars"></i>'
                : '<i class="bi bi-person-fill"></i>';

            const bubble = document.createElement("div");
            bubble.className = `bubble ${role}`;
            bubble.innerHTML = formatContent(content);

            row.appendChild(avatar);
            row.appendChild(bubble);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
            return bubble;
        }

        function showTyping() {
            const chatBox = document.getElementById("chatBox");
            const row = document.createElement("div");
            row.className = "msg-row ai";
            row.id = "typingRow";

            const avatar = document.createElement("div");
            avatar.className = "avatar ai";
            avatar.innerHTML = '<i class="bi bi-stars"></i>';

            const bubble = document.createElement("div");
            bubble.className = "bubble ai typing-indicator";
            bubble.innerHTML = "<span></span><span></span><span></span>";

            row.appendChild(avatar);
            row.appendChild(bubble);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function removeTyping() {
            const el = document.getElementById("typingRow");
            if (el) el.remove();
        }

        // ── Send ──
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text || isLoading) return;

            // Show chat area
            document.getElementById("welcome").style.display = "none";
            document.getElementById("chatBox").style.display = "flex";
            document.getElementById("chatBox").style.flexDirection = "column";

            input.value = "";
            input.style.height = "auto";
            isLoading = true;
            document.getElementById("sendBtn").disabled = true;

            appendMessage("user", text);
            showTyping();

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text,
                        history: history
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Request gagal");
                }

                const data = await res.json();
                sessionId = data.session_id;
                const reply = data.response || "Tidak ada respons.";

                // Update history
                history.push({ role: "user", content: text });
                history.push({ role: "assistant", content: reply });

                removeTyping();
                appendMessage("ai", reply);

            } catch (err) {
                removeTyping();
                appendMessage("ai", "⚠️ Error: " + err.message);
                showToast(err.message);
            } finally {
                isLoading = false;
                document.getElementById("sendBtn").disabled = false;
                input.focus();
            }
        }

        function sendSuggestion(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function clearChat() {
            history = [];
            sessionId = null;
            document.getElementById("chatBox").innerHTML = "";
            document.getElementById("chatBox").style.display = "none";
            document.getElementById("welcome").style.display = "flex";
        }

        // ── Toast ──
        function showToast(msg) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 4000);
        }
    </script>
</body>

</html>
